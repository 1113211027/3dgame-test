<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 虛擬助教 - 美智</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0f172a; /* 柔和的深海藍，不刺眼 */
            touch-action: none; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-[calc(100%-2rem)] sm:w-full max-w-lg pointer-events-auto flex flex-col gap-3 bg-slate-800/60 backdrop-blur-lg p-4 rounded-2xl shadow-lg border border-slate-600/50 z-10 transition-all duration-300">
            
            <div id="chat-bubble" class="hidden px-2 max-h-40 overflow-y-auto no-scrollbar">
                <p id="chat-text" class="text-lg text-slate-100 font-medium leading-relaxed drop-shadow-sm"></p>
            </div>

            <div class="flex gap-2 w-full">
                <button id="mic-btn" class="bg-slate-700/50 hover:bg-slate-600/60 text-blue-300 px-3 py-3 rounded-xl shadow-inner border border-slate-500/30 transition-colors shrink-0 flex items-center justify-center" title="語音輸入">
                    <svg id="mic-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </button>

                <input type="text" id="chat-input" placeholder="與角色對話..." class="flex-1 bg-slate-900/50 text-slate-100 placeholder-slate-400 px-4 py-3 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-400 focus:bg-slate-800/80 shadow-inner text-base transition-colors" />
                
                <button id="send-btn" class="bg-blue-600/90 hover:bg-blue-500 active:scale-95 text-white px-5 py-3 rounded-xl shadow transition-all duration-150 font-bold text-base shrink-0">發送</button>
            </div>
        </div>

        <div class="flex justify-between items-end w-full">
            <div class="hidden sm:flex bg-slate-900/70 backdrop-blur-md text-slate-100 p-4 rounded-xl shadow-xl border border-slate-700 max-w-xs pointer-events-auto flex-col gap-3">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold text-blue-300">AI 虛擬助教</h1>
                    <div class="flex items-center gap-3">
                        <div id="status-light" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)] transition-colors" title="API狀態：準備就緒"></div>
                    </div>
                </div>
                <p class="text-xs text-slate-300">系統已載入模型。可以直接開始對話。</p>
                <div id="loading-status" class="mt-3 text-xs text-yellow-400 flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-2 h-3 w-3 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    模型載入中...
                </div>
                <div id="error-status" class="mt-3 text-xs text-red-400 hidden text-center"></div>
            </div>

            <div class="hidden sm:block bg-slate-900/70 backdrop-blur-md text-slate-200 p-3 rounded-xl shadow-lg border border-slate-700 text-xs pointer-events-auto">
                <h3 class="font-bold text-blue-300 mb-1 border-b border-slate-600 pb-1">操作說明</h3>
                <ul class="space-y-1 text-slate-400">
                    <li><span class="text-blue-400 font-bold">左鍵</span> : 旋轉 / <span class="text-blue-400 font-bold">右鍵</span> : 平移</li>
                    <li><span class="text-blue-400 font-bold">滾輪</span> : 縮放視角</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, controls;
        let currentVrm = undefined;
        let particles; // 科技數據流粒子
        const clock = new THREE.Clock();

        let knowledgeBaseText = "";
        let systemPromptText = "你是一個擁有 3D 虛擬身體的 AI 虛擬助教。你的名字叫做『美智』。回答要簡短生動。";
        let openingPhrase = "您好！我是美智，文藻的 AI 虛擬助教。";

        let expressionTimer = 0;
        let expressionBlend = 1;
        let currentExpression = 'neutral';
        let targetExpression = 'neutral';
        const expressions = ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'neutral'];
        let activeSpecialAction = null;
        let specialActionTimer = 0;
        let isSpeaking = false;
        let lipSyncTimer = 0;
        
        let conversationHistory = []; // 初始化對話紀錄

        async function loadConfig() {
            try {
                const promptUrl = './prompt.txt';
                const kbUrl = './knowledgebase.txt';
                const [promptRes, kbRes] = await Promise.all([
                    fetch(promptUrl).catch(() => null),
                    fetch(kbUrl).catch(() => null)
                ]);

                if (kbRes && kbRes.ok) knowledgeBaseText = await kbRes.text();
                if (promptRes && promptRes.ok) {
                    const fullPromptText = await promptRes.text();
                    const parts = fullPromptText.split(/[=-]{3}\s*提示詞\s*[=-]{3}/);
                    if (parts.length > 1) {
                        openingPhrase = parts[0].replace(/[=-]{3}\s*開場詞\s*[=-]{3}/, '').trim();
                        systemPromptText = parts[1].trim() + " (備註：你擁有名字美智與虛擬身體，回答簡短生動。)";
                    } else {
                        systemPromptText = fullPromptText.trim();
                    }
                }
            } catch (error) {
                console.warn("載入設定檔失敗", error);
            }
        }

        function triggerOpeningPhrase() {
            if (!openingPhrase) return;
            const chatBubble = document.getElementById('chat-bubble');
            const chatText = document.getElementById('chat-text');
            chatBubble.classList.remove('hidden');
            chatText.innerHTML = `${openingPhrase}`;
            speakAndLipSync(openingPhrase);
            
            // 【重要修復】：不要把開場白推入 conversationHistory 中！
            // Gemini API 嚴格要求歷史紀錄必須從 user 角色開始，如果從 model 開始會報錯 400 Bad Request。
            // conversationHistory.push(...) 被移除了
        }

        async function init() {
            const container = document.getElementById('canvas-container');
            await loadConfig();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a); // 柔和深色
            scene.fog = new THREE.Fog(0x0f172a, 8, 25);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.45, -1.6); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.screenSpacePanning = true;
            controls.target.set(0, 1.3, 0); 
            controls.update();

            setupEnvironment();

            window.addEventListener('resize', onWindowResize);
            loadVRM('./AvatarSample_W.vrm');
            animate();
        }

        function setupEnvironment() {
            // 護眼溫和燈光
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
            directionalLight.position.set(2, 4, 3);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.bias = -0.001;
            scene.add(directionalLight);

            const fillLight = new THREE.DirectionalLight(0xaaccff, 1.0);
            fillLight.position.set(-2, 2, 2);
            scene.add(fillLight);

            // 乾淨深色地板
            const floorGeometry = new THREE.PlaneGeometry(50, 50);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.9, metalness: 0.1 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 科技感網格
            const gridHelper = new THREE.GridHelper(50, 100, 0x3b82f6, 0x1e293b);
            gridHelper.position.y = 0.01;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);

            // 科技風粒子 (數據流向上升)
            const particleCount = 150;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount; i++) {
                // 將粒子分佈在角色周圍
                particlePositions[i*3] = (Math.random() - 0.5) * 8; 
                particlePositions[i*3+1] = Math.random() * 4;       // Y 軸
                particlePositions[i*3+2] = (Math.random() - 0.5) * 8; 
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            // 粒子材質改為方塊狀、科技藍色
            const particleMaterial = new THREE.PointsMaterial({ 
                color: 0x60a5fa, 
                size: 0.04, 
                transparent: true, 
                opacity: 0.6 
            });
            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        function loadVRM(url) {
            const loadingUI = document.getElementById('loading-status');
            const errorUI = document.getElementById('error-status');
            if(loadingUI) loadingUI.classList.remove('hidden');
            if(errorUI) errorUI.classList.add('hidden');
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.load(url, (gltf) => {
                    const vrm = gltf.userData.vrm;
                    if (currentVrm) scene.remove(currentVrm.scene);
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    VRMUtils.removeUnnecessaryJoints(gltf.scene);
                    vrm.scene.traverse((obj) => {
                        obj.frustumCulled = false;
                        if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
                    });
                    vrm.scene.position.y = 0.1;
                    vrm.scene.rotation.y = Math.PI;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    if(loadingUI) loadingUI.classList.add('hidden');
                    triggerOpeningPhrase();
                },
                undefined, (error) => {
                    if(loadingUI) loadingUI.classList.add('hidden');
                    if(errorUI) { errorUI.textContent = '無法載入模型'; errorUI.classList.remove('hidden'); }
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (currentVrm && currentVrm.expressionManager) {
                expressionTimer += delta;
                if (expressionTimer > 4.0) {
                    expressionTimer = 0; currentExpression = targetExpression;
                    targetExpression = expressions[Math.floor(Math.random() * expressions.length)];
                    expressionBlend = 0;
                }
                if (expressionBlend < 1.0) expressionBlend = Math.min(1.0, expressionBlend + delta * 2.0);
                expressions.forEach(exp => currentVrm.expressionManager.setValue(exp, 0));
                
                if (specialActionTimer > 0 && activeSpecialAction) {
                    specialActionTimer -= delta; currentVrm.expressionManager.setValue(activeSpecialAction, 1.0);
                } else if (activeSpecialAction) {
                    currentVrm.expressionManager.setValue(activeSpecialAction, 0); activeSpecialAction = null;
                }
                
                if (isSpeaking) {
                    currentVrm.expressionManager.setValue('happy', 1.0);
                    lipSyncTimer += delta * 15;
                    const mouthOpenness = (Math.sin(lipSyncTimer) + 1) / 2; 
                    if (activeSpecialAction !== 'aa') currentVrm.expressionManager.setValue('aa', mouthOpenness * (Math.random() * 0.4 + 0.6));
                } else {
                    currentVrm.expressionManager.setValue(currentExpression, 1.0 - expressionBlend);
                    currentVrm.expressionManager.setValue(targetExpression, expressionBlend);
                    if (activeSpecialAction !== 'aa') currentVrm.expressionManager.setValue('aa', 0);
                }
                currentVrm.update(delta);
            }

            // 數據流粒子動畫 (緩慢向上升，出界後重置到下方)
            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] += delta * 0.2; // Y軸緩慢上升
                    if (positions[i] > 4.0) positions[i] = 0; // 重置高度
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBubble = document.getElementById('chat-bubble');
        const chatText = document.getElementById('chat-text');
        const statusLight = document.getElementById('status-light');

        function setStatus(status) {
            if (!statusLight) return;
            statusLight.className = 'w-3 h-3 rounded-full transition-colors ';
            if (status === 'connecting') statusLight.className += 'bg-blue-400 animate-pulse';
            else if (status === 'success') statusLight.className += 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]';
            else if (status === 'error') statusLight.className += 'bg-red-500';
            else statusLight.className += 'bg-green-500';
        }

        async function fetchWithBackoff(url, options, maxRetries = 2) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                }
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            chatBubble.classList.remove('hidden');
            chatText.innerHTML = `<span class="text-blue-200 text-sm opacity-70">你：${text}</span><br><span class="text-slate-300 text-sm animate-pulse">正在思考中...</span>`;
            setStatus('connecting');
            
            // 推送使用者訊息到紀錄
            conversationHistory.push({ role: "user", parts: [{ text: text }] });
            
            const safeFullSystemInstruction = `${systemPromptText}\n\n【重要指示】請優先使用知識庫回答。你的名字是『美智』。\n\n【知識庫內容】\n${knowledgeBaseText}`;

            try {
                const response = await fetchWithBackoff(`/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        systemPrompt: safeFullSystemInstruction,
                        knowledgeBase: knowledgeBaseText 
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                const aiText = data.candidates[0].content.parts[0].text;
                let replyText = aiText;
                
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    try {
                        const aiResponse = JSON.parse(jsonMatch[0]);
                        replyText = aiResponse.reply || "（沒有回覆文字）";
                        if (expressions.includes(aiResponse.expression)) { targetExpression = aiResponse.expression; expressionBlend = 0; expressionTimer = -10.0; }
                        if (aiResponse.specialAction && aiResponse.specialAction !== 'none') { activeSpecialAction = aiResponse.specialAction; specialActionTimer = aiResponse.actionDuration || 3; }
                    } catch (e) { replyText = aiText.replace(/[{}"]/g, "").trim(); }
                }
                
                setStatus('success');
                chatText.innerHTML = `<span class="text-slate-100">${replyText}</span>`;
                speakAndLipSync(replyText);
                
                // 推送 AI 訊息到紀錄，確保一問一答順序正確
                conversationHistory.push({ role: "model", parts: [{ text: jsonMatch ? jsonMatch[0] : aiText }] });
            } catch (error) {
                console.error("發送訊息失敗:", error);
                setStatus('error');
                chatText.innerHTML = `<span class="text-red-400 font-bold">連線失敗。請確認 API 金鑰或網路狀態。</span>`;
                // 若失敗則把剛剛 push 的 user 移除，避免紀錄順序錯亂
                conversationHistory.pop();
            }
        }

        function speakAndLipSync(text) {
            window.speechSynthesis.cancel(); isSpeaking = false;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; isSpeaking = true; 
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            utterance.onerror = () => { isSpeaking = false; };
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        window.onload = init;
    </script>
</body>
</html>
