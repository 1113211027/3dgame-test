<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 虛擬助教 - 美智</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 防止手機滑動觸發 */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0b1021; /* 極深邃藍背景色 */
            touch-action: none; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 0; 
        }

        /* UI 層設定 */
        #ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            pointer-events: none; 
        }
        
        .pointer-events-auto { pointer-events: auto; }

        /* 隱藏對話框滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 聊天文字陰影，確保清楚顯示在任何模型上 */
        .text-glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-[calc(100%-2rem)] sm:w-full max-w-lg pointer-events-auto flex flex-col gap-3 bg-white/5 backdrop-blur-md p-4 rounded-2xl shadow-inner border border-white/10 z-10 transition-all duration-300">
            
            <div id="chat-bubble" class="hidden px-2 max-h-40 overflow-y-auto no-scrollbar">
                <p id="chat-text" class="text-xl text-cyan-100 font-bold leading-relaxed text-glow drop-shadow-md"></p>
            </div>

            <div class="flex gap-2 w-full">
                <button id="mic-btn" class="bg-cyan-950/30 hover:bg-cyan-900/40 backdrop-blur text-cyan-200 px-3 py-3 rounded-xl shadow border border-cyan-800/30 transition-colors shrink-0 flex items-center justify-center" title="語音輸入">
                    <svg id="mic-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </button>

                <input type="text" id="chat-input" placeholder="與角色對話..." class="flex-1 bg-cyan-950/20 text-cyan-100 placeholder-cyan-700 px-4 py-3 rounded-xl border border-cyan-900 focus:outline-none focus:border-cyan-500 focus:bg-cyan-950/40 shadow-inner text-base transition-colors font-medium" />
                
                <button id="send-btn" class="bg-cyan-700 hover:bg-cyan-600 active:scale-95 active:bg-cyan-800 backdrop-blur text-white px-5 py-3 rounded-xl shadow transition-all duration-150 font-bold text-base shrink-0">發送</button>
            </div>
        </div>

        <div class="flex justify-between items-end w-full">
            
            <div class="hidden sm:flex bg-gray-950/80 backdrop-blur text-white p-4 rounded-xl shadow-xl border border-gray-800/50 max-w-xs pointer-events-auto flex-col gap-3">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold text-cyan-300 text-glow">AI 虛擬助教 - 美智</h1>
                    <div class="flex items-center gap-3">
                        <div id="status-light" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)] transition-colors" title="API狀態：準備就緒"></div>
                    </div>
                </div>
                <p class="text-xs text-gray-400">系統已自動載入預設角色模型。您可以直接與其展開對話。</p>
                
                <div id="loading-status" class="mt-3 text-xs text-yellow-400 flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-2 h-3 w-3 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    模型載入中...
                </div>
                <div id="error-status" class="mt-3 text-xs text-red-400 hidden text-center"></div>
            </div>

            <div class="hidden sm:block bg-gray-950/80 backdrop-blur text-white p-3 rounded-xl shadow-lg border border-gray-800/50 text-xs pointer-events-auto">
                <h3 class="font-bold text-cyan-300 mb-1 border-b border-gray-700 pb-1 text-glow">操作說明</h3>
                <ul class="space-y-1 text-gray-400">
                    <li><span class="text-cyan-400 font-bold">左鍵</span> : 旋轉視角 / <span class="text-cyan-400 font-bold">右鍵</span> : 平移</li>
                    <li><span class="text-cyan-400 font-bold">滾輪</span> : 縮放</li>
                </ul>
            </div>

        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        // --- 全域變數 ---
        let scene, camera, renderer, controls;
        let currentVrm = undefined;
        let particles;
        const clock = new THREE.Clock();

        // 知識庫與設定變數
        let knowledgeBaseText = "";
        let systemPromptText = "你是一個擁有 3D 虛擬身體的 AI 虛擬助教。你的名字叫做『美智』。回答要簡短生動。";
        let openingPhrase = "您好！我是美智，文藻的 AI 虛擬助教。";

        // 表情動作控制變數
        let expressionTimer = 0;
        let expressionBlend = 1;
        let currentExpression = 'neutral';
        let targetExpression = 'neutral';
        const expressions = ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'neutral'];
        let activeSpecialAction = null;
        let specialActionTimer = 0;
        let isSpeaking = false;
        let lipSyncTimer = 0;
        let conversationHistory = [];
        let autoRestartMic = false;

        // --- 載入外部設定檔 (保留原本邏輯) ---
        async function loadConfig() {
            try {
                const promptUrl = './prompt.txt';
                const kbUrl = './knowledgebase.txt';

                const [promptRes, kbRes] = await Promise.all([
                    fetch(promptUrl).catch(() => null),
                    fetch(kbUrl).catch(() => null)
                ]);

                if (kbRes && kbRes.ok) {
                    knowledgeBaseText = await kbRes.text();
                }

                if (promptRes && promptRes.ok) {
                    const fullPromptText = await promptRes.text();
                    const parts = fullPromptText.split(/[=-]{3}\s*提示詞\s*[=-]{3}/);
                    if (parts.length > 1) {
                        openingPhrase = parts[0].replace(/[=-]{3}\s*開場詞\s*[=-]{3}/, '').trim();
                        systemPromptText = parts[1].trim() + " (備註：你擁有名字美智與虛擬身體，回答簡短生動。)";
                    } else {
                        systemPromptText = fullPromptText.trim();
                    }
                }
            } catch (error) {
                console.warn("載入設定檔失敗", error);
            }
        }

        // --- 觸發開場白 ---
        function triggerOpeningPhrase() {
            if (!openingPhrase) return;
            const chatBubble = document.getElementById('chat-bubble');
            const chatText = document.getElementById('chat-text');
            chatBubble.classList.remove('hidden');
            chatText.innerHTML = `${openingPhrase}`;
            speakAndLipSync(openingPhrase);
            conversationHistory.push({ role: "model", parts: [{ text: JSON.stringify({ reply: openingPhrase, expression: "happy", specialAction: "none", actionDuration: 3 }) }] });
        }

        // --- 初始化場景 (主要設計變更點) ---
        async function init() {
            const container = document.getElementById('canvas-container');
            await loadConfig();

            scene = new THREE.Scene();
            // 變更背景色為極深藍，更貼合科技感，且讓角色霓虹補光更顯眼
            scene.background = new THREE.Color(0x0b1021);
            // 變更霧氣色調與濃度
            scene.fog = new THREE.Fog(0x0b1021, 12, 30);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            // 稍微調整相機位置，更靠近角色
            camera.position.set(0, 1.45, -1.55); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.screenSpacePanning = true;
            controls.target.set(0, 1.3, 0); 
            controls.update();

            // 呼叫全新的環境燈光與物體設計
            setupEnvironment();

            window.addEventListener('resize', onWindowResize);
            const modelUrl = './AvatarSample_W.vrm';
            loadVRM(modelUrl);
            animate();
        }

        // 重新設計環境 (燈光與地板)
        function setupEnvironment() {
            // 1. 環境光調整為淡藍色
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x222244, 0.6);
            scene.add(ambientLight);

            // 2. 主光源 (霓虹青色，從右前方照亮)
            const directionalLight = new THREE.DirectionalLight(0x00ffff, 2.5);
            directionalLight.position.set(2, 4, 3);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.bias = -0.001;
            scene.add(directionalLight);

            // 3. 補光 (霓虹紫色，從左方照亮，增加立體感與特色)
            const fillLight = new THREE.DirectionalLight(0xff00ff, 1.5);
            fillLight.position.set(-2, 2, 2);
            scene.add(fillLight);

            // 4. 地板改為極深色，粗糙金屬感
            const floorGeometry = new THREE.PlaneGeometry(50, 50);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.8, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 5. 網格Helper調整為淡青色與深色網格線
            const gridHelper = new THREE.GridHelper(50, 100, 0x00ffff, 0x004455);
            gridHelper.position.y = 0.01;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.5;
            scene.add(gridHelper);

            // 6. 底座改為深色
            const pedestalGeometry = new THREE.CylinderGeometry(0.8, 1, 0.1, 32);
            const pedestalMaterial = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.4, metalness: 0.6 });
            const pedestal = new THREE.Mesh(pedestalGeometry, pedestalMaterial);
            pedestal.position.y = 0.05;
            pedestal.receiveShadow = true;
            pedestal.castShadow = true;
            scene.add(pedestal);

            // 7. 底座發光環調整為青色
            const ringGeometry = new THREE.RingGeometry(0.85, 0.9, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.11;
            scene.add(ring);

            // 8. 粒子效果保留
            const particleCount = 200;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            const particleColors = new Float32Array(particleCount * 3);
            const color = new THREE.Color();
            for(let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 10;
                particlePositions[i*3+1] = Math.random() * 5;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 10;
                color.setHSL(Math.random(), 1.0, 0.5);
                particleColors[i*3] = color.r;
                particleColors[i*3+1] = color.g;
                particleColors[i*3+2] = color.b;
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
            const particleMaterial = new THREE.PointsMaterial({ size: 0.08, transparent: true, opacity: 0.9, vertexColors: true });
            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        // --- 載入 VRM / 動畫 / Gemini API / 語音 ---
        // (此處保留你原本辛辛苦苦寫好的、完全正確的所有邏輯程式碼，不動任何一行，只在 API sendMessage 處修正Payload)

        function loadVRM(url) {
            const loadingUI = document.getElementById('loading-status');
            const errorUI = document.getElementById('error-status');
            if(loadingUI) loadingUI.classList.remove('hidden');
            if(errorUI) errorUI.classList.add('hidden');
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.load(url, (gltf) => {
                    const vrm = gltf.userData.vrm;
                    if (currentVrm) scene.remove(currentVrm.scene);
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    VRMUtils.removeUnnecessaryJoints(gltf.scene);
                    vrm.scene.traverse((obj) => {
                        obj.frustumCulled = false;
                        if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
                    });
                    if (vrm.humanoid) {
                        const leftUpperArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
                        const rightUpperArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
                        if (leftUpperArm) leftUpperArm.rotation.z = -1.1; 
                        if (rightUpperArm) rightUpperArm.rotation.z = 1.1; 
                    }
                    vrm.scene.position.y = 0.1;
                    vrm.scene.rotation.y = Math.PI;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    if(loadingUI) loadingUI.classList.add('hidden');
                    console.log('模型自動載入成功!');
                    triggerOpeningPhrase();
                },
                undefined, (error) => {
                    console.error('模型載入失敗:', error);
                    if(loadingUI) loadingUI.classList.add('hidden');
                    if(errorUI) { errorUI.textContent = '無法載入預設模型'; errorUI.classList.remove('hidden'); }
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            if (currentVrm) {
                if (currentVrm.humanoid) {
                    const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
                    if (chest) chest.rotation.x = Math.sin(time * 1.5) * 0.015;
                }
                if (currentVrm.expressionManager) {
                    expressionTimer += delta;
                    if (expressionTimer > 4.0) {
                        expressionTimer = 0; currentExpression = targetExpression;
                        targetExpression = expressions[Math.floor(Math.random() * expressions.length)];
                        expressionBlend = 0;
                    }
                    if (expressionBlend < 1.0) {
                        expressionBlend += delta * 2.0; 
                        if (expressionBlend > 1.0) expressionBlend = 1.0;
                    }
                    expressions.forEach(exp => currentVrm.expressionManager.setValue(exp, 0));
                    if (specialActionTimer > 0 && activeSpecialAction) {
                        specialActionTimer -= delta; currentVrm.expressionManager.setValue(activeSpecialAction, 1.0);
                    } else if (activeSpecialAction) {
                        currentVrm.expressionManager.setValue(activeSpecialAction, 0); activeSpecialAction = null;
                    }
                    if (isSpeaking) {
                        currentVrm.expressionManager.setValue('happy', 1.0);
                        lipSyncTimer += delta * 15;
                        const mouthOpenness = (Math.sin(lipSyncTimer) + 1) / 2; 
                        if (activeSpecialAction !== 'aa') {
                            currentVrm.expressionManager.setValue('aa', mouthOpenness * (Math.random() * 0.4 + 0.6));
                        }
                    } else {
                        currentVrm.expressionManager.setValue(currentExpression, 1.0 - expressionBlend);
                        currentVrm.expressionManager.setValue(targetExpression, expressionBlend);
                        if (activeSpecialAction !== 'aa') { currentVrm.expressionManager.setValue('aa', 0); }
                    }
                }
                currentVrm.update(delta);
            }
            if (particles) particles.rotation.y += delta * 0.05;
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBubble = document.getElementById('chat-bubble');
        const chatText = document.getElementById('chat-text');
        const statusLight = document.getElementById('status-light');
        function setStatus(status) {
            if (!statusLight) return;
            statusLight.className = 'w-3 h-3 rounded-full transition-colors ';
            if (status === 'connecting') statusLight.className += 'bg-blue-400 animate-pulse';
            else if (status === 'success') statusLight.className += 'bg-green-500';
            else if (status === 'error') statusLight.className += 'bg-red-500';
            else statusLight.className += 'bg-green-500';
        }

        async function fetchWithBackoff(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 400 || response.status === 403 || response.status === 404) throw new Error(`API Error ${response.status}`);
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                }
                await new Promise(r => setTimeout(r, delays[i]));
            }
        }

        // --- sendMessage (配合新的安全後端調整 Payload) ---
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            chatBubble.classList.remove('hidden');
            // 更新思考中樣式
            chatText.innerHTML = `<span class="text-cyan-300 text-sm opacity-70">你：${text}</span><br><span class="text-white/60 text-sm animate-pulse">正在思考中...</span>`;
            setStatus('connecting');
            conversationHistory.push({ role: "user", parts: [{ text: text }] });
            
            // 安全淨化 Prompt：將名字美智指令放在最後，確保 AI 永遠記住
            const safeFullSystemInstruction = `${systemPromptText}\n\n【重要指示】請優先使用下方的知識庫回答。你的名字是『美智』。\n\n【知識庫內容】\n${knowledgeBaseText}`;

            try {
                const response = await fetchWithBackoff(`/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        // 配合新的安全後端，傳送 systemPrompt 與 knowledgeBase
                        systemPrompt: safeFullSystemInstruction,
                        knowledgeBase: knowledgeBaseText 
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                const aiText = data.candidates[0].content.parts[0].text;
                let replyText = aiText;
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    try {
                        const aiResponse = JSON.parse(jsonMatch[0]);
                        replyText = aiResponse.reply || "（沒有回覆文字）";
                        if (expressions.includes(aiResponse.expression)) { targetExpression = aiResponse.expression; expressionBlend = 0; expressionTimer = -10.0; }
                        if (aiResponse.specialAction && aiResponse.specialAction !== 'none') { activeSpecialAction = aiResponse.specialAction; specialActionTimer = aiResponse.actionDuration || 3; }
                    } catch (e) { console.warn("JSON 解析失敗", e); replyText = aiText.replace(/[{}"]/g, "").trim(); }
                }
                setStatus('success');
                // 改變為亮色文字與科技光暈
                chatText.innerHTML = `<span class="text-white text-glow">${replyText}</span>`;
                speakAndLipSync(replyText);
                conversationHistory.push({ role: "model", parts: [{ text: jsonMatch ? jsonMatch[0] : aiText }] });
            } catch (error) {
                console.error("發送訊息失敗:", error);
                setStatus('error');
                chatText.innerHTML = `<span class="text-red-400 font-bold">連線失敗。</span>`;
                conversationHistory.pop();
            }
        }

        window.keepAliveUtterances = [];
        let speechCheckInterval = null;
        function speakAndLipSync(text) {
            window.speechSynthesis.cancel(); isSpeaking = false;
            if (speechCheckInterval) clearInterval(speechCheckInterval);
            if (window.speechSynthesis.resume) window.speechSynthesis.resume();
            const utterance = new SpeechSynthesisUtterance(text);
            window.keepAliveUtterances.push(utterance);
            utterance.lang = 'zh-TW'; isSpeaking = true; 
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; if (window.keepAliveUtterances.length > 20) window.keepAliveUtterances.length = 0; if (autoRestartMic && recognition && !isRecording) { try { recognition.start(); } catch (e) {} } };
            utterance.onerror = (e) => { isSpeaking = false; if (autoRestartMic && recognition && !isRecording) { try { recognition.start(); } catch (err) {} } };
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
            let confirmStopCount = 0;
            speechCheckInterval = setInterval(() => {
                if (!window.speechSynthesis.speaking) { confirmStopCount++; if (confirmStopCount > 3) { isSpeaking = false; clearInterval(speechCheckInterval); if (autoRestartMic && recognition && !isRecording) { try { recognition.start(); } catch (e) {} } } } else { confirmStopCount = 0; isSpeaking = true; }
            }, 200);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        window.onload = init;
    </script>
</body>
</html>
